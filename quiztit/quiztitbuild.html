<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizt'it Builder - Kaarten Generator</title>
    
    <link rel="stylesheet" href="quiztitbuild.css">
</head>
<body>

<div class="no-print">
    <div class="header-content">
        <h1>Quizt'it Generator <span style="font-size: 0.5em; font-weight: normal;">(8,9cm x 13,85cm)</span></h1>
        
        <div class="language-selector" style="margin-bottom: 15px;">
            <button onclick="switchLanguage('nl')" class="btn-lang" style="cursor: pointer; padding: 5px 15px; border-radius: 5px; border: 1px solid #ccc;">🇳🇱 Nederlands</button>
            <button onclick="switchLanguage('fr')" class="btn-lang" style="cursor: pointer; padding: 5px 15px; border-radius: 5px; border: 1px solid #ccc;">🇫🇷 Français</button>
        </div>

        <div class="button-group">
            <button onclick="renderCards('front')" class="btn-front">Voorkant</button>
            <button onclick="renderCards('back')" class="btn-back">Achterkant</button>
            <button onclick="combinePrint()" class="btn-print" style="background-color: #27ae60; color: white;">🖨️ Print</button>
        </div>
        
        <p id="status-msg" class="status" style="margin: 5px 0; font-size: 0.8em;"></p>
    </div>
</div>

    <div id="print-container">
        <div class="loading-placeholder">
            Maak verbinding met je Google Sheet om de kaarten te zien.
        </div>
    </div>

    <script src="quiztitbuild.js"></script>
</body>
</html>
