<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Soundtrack - Philippe 50</title>
    <link rel="stylesheet" href="philippe50.css">
    <style>
        /* Specifieke stijlen voor de soundtrack pagina */
        .soundtrack-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .lyrics-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-style: italic;
            font-size: 0.9rem;
            display: none; /* Standaard verborgen */
        }
        .download-link {
            display: inline-block;
            margin-top: 10px;
            color: #00f2ff;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .download-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="stars-container"></div>
    <div id="nav-placeholder"></div>

    <div class="card-container" style="max-width: 1000px; margin-top: 100px;">
        <div class="glass-card fade-in">
            <h1 style="text-align: center;">De Muzikale Reis</h1>
            <p style="text-align: center;">Beluister hier de nummers die de tijdreizen van Philippe begeleiden.</p>
            
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">

            <section class="story-soundtrack" style="margin-bottom: 50px;">
                <h2>Hoofdstuk 1: De Grammofoonspeler</h2>
                <div class="soundtrack-grid">
                    <div>
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/VIDEO_ID_1" allowfullscreen></iframe>
                        </div>
                        <a href="GOOGLE_DRIVE_LINK_1" target="_blank" class="download-link">💾 Download MP3 (Versie 1)</a>
                    </div>
                    <div>
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/VIDEO_ID_2" allowfullscreen></iframe>
                        </div>
                        <a href="GOOGLE_DRIVE_LINK_2" target="_blank" class="download-link">💾 Download MP3 (Versie 2)</a>
                    </div>
                </div>
                
                <button onclick="toggleLyrics('lyrics-h1')" class="submit-btn-alt" style="margin-top: 15px; width: auto; padding: 5px 15px;">
                    📜 Toon Liedtekst
                </button>
                <div id="lyrics-h1" class="lyrics-section">
                    Hier komt de tekst van het liedje voor hoofdstuk 1...<br>
                    Regel 2...<br>
                    Regel 3...
                </div>
            </section>

            </div>
    </div>

    <script src="menu.js"></script>
    <script>
        // Simpele functie om tekst te tonen/verbergen
        function toggleLyrics(id) {
            const el = document.getElementById(id);
            if (el.style.display === "block") {
                el.style.display = "none";
            } else {
                el.style.display = "block";
            }
        }
    </script>
</body>
</html>
