<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Soundtrack - Philippe 50</title>
    <link rel="stylesheet" href="../philippe50.css">
    <style>
        .soundtrack-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .lyrics-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.6;
            display: none;
            border-left: 3px solid #ff00de;
        }
        .download-link {
            display: inline-block;
            margin-top: 10px;
            color: #00f2ff;
            text-decoration: none;
            font-size: 0.85rem;
            background: rgba(0, 242, 255, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .download-link:hover { 
            background: rgba(0, 242, 255, 0.2);
            text-decoration: none;
        }
        .story-soundtrack {
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="stars-container"></div>
    
    <div id="nav-placeholder"></div>

    <div class="card-container" style="max-width: 1000px; margin-top: 100px;">
        <div class="glass-card fade-in">
            <h1 style="text-align: center;">De Muzikale Reis</h1>
            <p style="text-align: center;">"Geluid plant zich niet voort in het vacuüm van de ruimte, maar wel in onze herinneringen... <br>
    Ontgrendel hier de soundtracks die de voorbije 50j de grenzen van tijd en ruimte hebben doorbroken."</p>
            
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">

            <div id="soundtrack-list">
                <p style="text-align: center; font-style: italic; color: rgba(255,255,255,0.5);">De instrumenten worden gestemd...</p>
            </div>

            <div style="text-align: center; margin-top: 40px;">
                <a href="../index.html" class="submit-btn-alt">← Terug naar de start</a>
            </div>
        </div>
    </div>

    <script src="../menu.js"></script>
    <script src="../philippe50.js"></script>
    
    <script src="soundtrack.js"></script>
</body>
</html>
