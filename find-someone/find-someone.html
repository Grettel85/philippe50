<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Someone Who - Philippe 50</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="find-someone.css">
</head>
<body>

    <div class="no-print">
        <h1>Bingo Generator</h1>
        
        <div class="button-group">
            <button onclick="generateGrid('mix')" class="btn-main">Single Mix (Volw.)</button>
            <button onclick="generateGrid('kids')" class="btn-kids" style="background: #ffcc00;">Single Mix (Kids)</button>
            
            <div style="border-left: 1px solid #ccc; margin-left: 10px; padding-left: 10px; display: flex; align-items: center; gap: 8px;">
                <label for="print-count" style="font-size: 12px; font-weight: bold;">Aantal:</label>
                <input type="number" id="print-count" value="1" min="1" max="50" style="width: 45px; padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                <button onclick="prepareAndPrint('mix')" style="background: #28a745; color: white;">🖨️ Print Batch Volw.</button>
                <button onclick="prepareAndPrint('kids')" style="background: #ff8800; color: white;">🖨️ Print Batch Kids</button>
            </div>
        </div>
        
        <p id="status-msg" style="font-size: 11px; margin-top: 5px; color: #666; margin-bottom: 0;">Laden...</p>
    </div>

    <div id="main-container" class="book-container"></div>

    <template id="rules-template">
        <div class="rules-container logbook">
            <header class="log-header">
                <span class="log-id">LOG_ID: PH-50-2026</span>
                <span class="log-status">MISSION: ACTIVE</span>
            </header>

            <div class="rules-block nl">
                <h2>Intergalactisch Protocol</h2>
                <ul>
                    <li><strong>De Missie:</strong> Voltooi de "Vind iemand die" op de linkerpagina om je rang te verhogen.</li>
                    <li><strong>Entertainment-Capsules:</strong> Er liggen overal spellen uit verschillende tijdperken verspreid in het schip.</li>
                    <li><strong>De Bovenste Melkweg:</strong> Bezoek de Lounge van de Toekomst (boven) om te chillen of je volgende sprong voor te bereiden.</li>
                    <li><strong>Orde in Tijd en Ruimte:</strong> Een goede tijdreiziger ruimt zijn missie-materiaal na gebruik weer netjes op.</li>
                    <li><strong>Galactische Beelden:</strong> Leg de feestelijke sterrenhemel vast op foto en straal ze naderhand door naar Philippe.</li>
                    <li><strong>De Legende van Philippe:</strong> Schrijf mee aan de epos! Scan de QR-code bij de befaamde grammofoonspeler.</li>
                    <li><strong>Zwaartekracht:</strong> Bij het horen van de juiste frequenties is het verplicht de zwaartekracht te negeren.</li>
                    <li><strong>Tijdreizen:</strong> Terugreizen naar 1976 is verboden. Geniet van de coördinaten van nu: Philippe 50!</li>
                    <li class="inline-chrono">Chronometer-status: 0 jaar verwijderd van de toekomst</li>
                </ul>
            </div>

            <div class="symbol-divider">
                <span>⏳</span> <span>🚀</span> <span>⌚</span> <span>✨</span> <span>💫</span>
            </div>

            <div class="rules-block fr">
                <h2>Protocole Intergalactique</h2>
                <ul>
                    <li><strong>La Mission :</strong> Complétez le "Trouvez quelqu'un qui" sur la page de gauche pour monter en grade.</li>
                    <li><strong>Capsules de Divertissement :</strong> Des jeux de différentes époques sont dispersés dans le vaisseau.</li>
                    <li><strong>La Galaxie Supérieure :</strong> Visitez le Lounge du Futur (à l'étage) pour vous détendre ou préparer votre prochain saut.</li>
                    <li><strong>Ordre dans le Temps et l'Espace :</strong> Un voyageur temporel range soigneusement son matériel.</li>
                    <li><strong>Images Galactiques :</strong> Capturez le ciel étoilé de la fête en photo et transmettez-les à Philippe.</li>
                    <li><strong>La Légende de Philippe :</strong> Contribuez à l'épopée ! Scannez le code QR situé près du tourne-disque.</li>
                    <li><strong>Gravité :</strong> Dès que les fréquences retentissent, il est obligatoire d'ignorer la gravité.</li>
                    <li><strong>Voyage Temporel :</strong> Le retour en 1976 est interdit. Profitez des coordonnées : Philippe 50 !</li>
                    <li class="inline-chrono">Statut du chronomètre: à 0 ans du futur</li>
                </ul>
            </div>

            <footer class="log-footer">
                <div class="mission-stamp stamp-philippe">
                    <div class="stamp-inner">
                        <span class="stamp-top">GOEDGEKEURD • APPROUVÉ</span>
                        <span class="stamp-main">PHILIPPE50</span>
                        <span class="stamp-bottom">CHRONOS-MISSIE VOLTOOID / MISSION RÉUSSIE</span>
                    </div>
                </div>
            </footer>
        </div>
    </template>

    <script src="find-someone.js"></script>
</body>
</html>
