<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Someone Who - Philippe 50</title>
    
    <link rel="stylesheet" href="find-someone.css">
</head>
<body>

    <div class="no-print">
        <h1>Bingo Generator</h1>
        <p>Kies een doelgroep voor een nieuw rooster:</p>
        
        <div class="button-group">
            <button onclick="generateGrid('mix')" class="btn-main">Volwassenen Mix (N1, N2, N3)</button>
            <button onclick="generateGrid('kids')" class="btn-kids" style="background: #ffcc00;">Kindermix (N1 & N2)</button>
            <button onclick="window.print()" style="background: #ccc; margin-left: 10px;">🖨️ Printen</button>
        </div>
        
        <p id="status-msg" style="font-size: 12px; margin-top: 10px; color: #666;">Data wordt geladen...</p>
    </div>

    <div class="a4-page">
        <div class="grid-container" id="bingo-grid">
            </div>
    </div>

    <script src="find-someone.js"></script>
</body>
</html>
