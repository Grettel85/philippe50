<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jouw Hoofdstuk - Philippe 50</title>
    <link rel="stylesheet" href="philippe50.css">
</head>
<body>
    <div class="stars-container"></div>
    <div class="card-container">
        <div class="language-switch">
            <button onclick="setLanguage('nl')" id="btn-nl">NL</button>
            <button onclick="setLanguage('fr')" id="btn-fr">FR</button>
        </div>

        <div class="glass-card fade-in">
            <h1 data-i18n="lookup-title">Ontgrendel jouw hoofdstuk</h1>
            <p data-i18n="lookup-desc">Voer je nickname en het geheime woord in.</p>
            
            <div class="input-group">
                <input type="text" id="lookup-name" placeholder="Nickname..." data-i18n="placeholder-name">
            </div>
            <div class="input-group">
                <input type="password" id="lookup-pw" placeholder="Geheim woord..." data-i18n="placeholder-pw">
            </div>
            
            <button onclick="findPersonalStory()" data-i18n="show-story-btn">Toon mijn verhaal</button>
            
            <div id="personal-story-content" style="margin-top: 30px; text-align: left;">
                <div id="hoofdstuk-vast" style="display: none;"> 
                    <h2 data-i18n="chapter1-title"></h2>
                    <p data-i18n="chapter1-text" style="white-space: pre-wrap;"></p>
                    <hr style="border: 0; border-top: 1px dashed rgba(255,255,255,0.3); margin: 20px 0;">
                </div>

                <div id="typewriter-output">
                </div>
            </div>

            <a href="index.html" class="submit-btn-alt" style="margin-top: 30px;" data-i18n="back-link">
                ← Terug naar de start
            </a>
        </div>
    </div>
    <script src="philippe50.js"></script>
</body>
</html>
