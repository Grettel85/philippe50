<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philippe 50 - Jouw Hoofdstuk</title>
    <link rel="stylesheet" href="philippe50.css">
</head>
<body>

    <div class="stars-container"></div>

    <div class="card-container">
        
        <div class="language-switch">
            <button onclick="setLanguage('nl')">NL</button>
            <button onclick="setLanguage('fr')">FR</button>
        </div>

        <div class="glass-card">
            <h2 id="lookup-title" style="color: #00f2ff; margin-bottom: 10px;" data-i18n="lookup-title">Ontgrendel jouw hoofdstuk</h2>
            <p id="lookup-desc" style="font-size: 0.9rem; margin-bottom: 25px; color: #e0e0e0;" data-i18n="lookup-desc">
                Voer je nickname en het geheime woord (je band met Philippe) in die je eerder hebt gekozen.
            </p>
            
            <div class="input-group">
                <label style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;" data-i18n="label-name">Jouw Nickname:</label>
                <input type="text" id="lookup-name" placeholder="...">
            </div>

            <div class="input-group">
                <label style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;" data-i18n="label-band">Jouw Geheim Woord:</label>
                <input type="password" id="lookup-pw" placeholder="...">
            </div>

            <button onclick="findPersonalStory()" class="submit-btn" style="margin-top: 10px;" data-i18n="show-story-btn">
                Toon mijn verhaal
            </button>
            
            <div id="personal-story-content" class="story-text" style="margin-top: 30px; min-height: 50px;">
                </div>
            
            <div style="text-align: center; margin-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 20px;">
                <a href="index.html" style="color: #ff00de; text-decoration: none; font-size: 0.85rem;" data-i18n="back-link">
                    ← Terug naar de start
                </a>
            </div>
        </div>

    </div>

    <script src="philippe50.js"></script>
    <script>
        // Extra vertalingen specifiek voor deze pagina toevoegen aan de bestaande config
        if (config && config.translations) {
            config.translations.nl["lookup-title"] = "Ontgrendel jouw hoofdstuk";
            config.translations.nl["lookup-desc"] = "Voer je nickname en het geheime woord (je band met Philippe) in.";
            config.translations.nl["show-story-btn"] = "Toon mijn verhaal";
            config.translations.nl["back-link"] = "← Terug naar de start";

            config.translations.fr["lookup-title"] = "Débloquez votre chapitre";
            config.translations.fr["lookup-desc"] = "Entrez votre nickname et le mot secret (votre lien avec Philippe).";
            config.translations.fr["show-story-btn"] = "Afficher mon histoire";
            config.translations.fr["back-link"] = "← Retour au début";
        }

        // Zorg dat de Enter-toets ook werkt op deze pagina
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                findPersonalStory();
            }
        });
    </script>
</body>
</html>
