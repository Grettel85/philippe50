<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philippe 50 - De Legende</title>
    <link rel="stylesheet" href="philippe50.css">
</head>
<body>
    <div class="stars-container"></div>
    <div class="card-container">
        <div class="language-switch">
            <button onclick="setLanguage('nl')" id="btn-nl" class="active-lang">NL</button>
            <button onclick="setLanguage('fr')" id="btn-fr">FR</button>
        </div>

        <div id="password-gate" class="glass-card fade-in">
            <h1 data-i18n="welcome">Welkom bij Philippe 50</h1>
            <p data-i18n="enter-code">Voer de geheime code in om deel te nemen:</p>
            <div class="input-group">
                <input type="password" id="password-input" placeholder="Wachtwoord..." data-i18n="placeholder-pw-code">
            </div>
            <button onclick="checkPassword()" data-i18n="login-btn">Log in</button>
            <p id="error-msg" style="color: #ff00de; display: none; margin-top: 10px;" data-i18n="wrong-pwd">Onjuiste code.</p>
            
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
            
            <a href="mijn-verhaal.html" class="submit-btn-alt" data-i18n="view-chapter">
                Bekijk jouw hoofdstuk
            </a>
        </div>

        <div id="form-section" class="glass-card fade-in" style="display: none;">
            <h2 data-i18n="form-title">Het verhaal van Philippe</h2>
            <form id="dragon-form" onsubmit="event.preventDefault(); submitForm();">
                
                <div class="input-group">
                    <label data-i18n="label-name">Jouw Nickname:</label>
                    <input type="text" id="deelnemer_naam" required data-i18n="placeholder-name">
                </div>

                <div class="input-group">
                    <label data-i18n="label-setting">Waar en/of wanneer is Philippe beland?</label>
                    <input type="text" id="input-setting" placeholder="bijv. 1984, de toekomst, disco-tijd..." required data-i18n="placeholder-setting">
                </div>

                <div class="input-group">
                    <label data-i18n="label-obstacle">Welk probleem heeft hij daar?</label>
                    <input type="text" id="input-obstacle" placeholder="bijv. De platenspeler hapert, wifi is weg, er brak een wiel van zijn waveboard, ..." required data-i18n="placeholder-obstacle">
                </div>

                <div class="input-group">
                    <label data-i18n="label-soundtrack">Welk liedje hoort bij dit avontuur?</label>
                    <input type="text" id="input-soundtrack" placeholder="Artiest - Titel" required data-i18n="placeholder-soundtrack">
                </div>

                <div class="input-group">
                    <label data-i18n="label-memory">Beschrijf je leukste herinnering met Philippe:</label>
                    <textarea id="philippe_herinnering" rows="3" required></textarea>
                </div>

                <div class="input-group">
                    <label data-i18n="label-email">Jouw E-mailadres:</label>
                    <input type="email" id="deelnemer_email" required>
                </div>

                <div class="input-group">
                    <label data-i18n="label-band">Welk woord doet je aan Philippe denken:</label>
                    <p style="font-size: 0.7rem; color: #ff00de;" data-i18n="band-note">(Dit is je wachtwoord voor later)</p>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" id="deelnemer_ww" required style="padding-right: 45px;">
                        <button type="button" onclick="copyPassword()" class="copy-btn" title="Kopieer wachtwoord" 
                            style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 1.2rem; width: auto; margin: 0; padding: 0;">
                            📋
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" data-i18n="submit-btn">Verstuur naar de Legende</button>
            </form>
        </div>
    </div>

    <script src="philippe50.js"></script>

    <button onclick="openSecureScroll()" class="legend-fab" title="Lees de Legende">
        <span class="legend-icon">📜</span>
    </button>


<a href="mailto:jolan.spelletjes@gmail.com?subject=HELP%20ME%20AUB%20/%20AIDEZ%20MOI%20SVP" class="help-button">
    <span class="help-tooltip">Hulp nodig? / Besoin d'aide?</span>
    ?
</a>
    
</body>
</html>
