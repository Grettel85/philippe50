<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philippe 50 - De Legende</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container"></div>

    <div class="card-container">
        <div class="lang-switch">
            <button id="btn-nl" onclick="setLanguage('nl')">NL</button>
            <button id="btn-fr" onclick="setLanguage('fr')">FR</button>
        </div>

        <div class="glass-card">
            <h1 data-i18n="lookup-title">Ontgrendel jouw hoofdstuk</h1>
            <p data-i18n="lookup-desc" class="subtitle">Voer je nickname en het geheime woord in.</p>
            
            <div class="input-group">
                <input type="text" id="lookup-name" placeholder="Jouw Nickname...">
                <input type="password" id="lookup-pw" placeholder="Geheim Woord...">
            </div>

            <button class="submit-btn" onclick="findPersonalStory()" data-i18n="show-story-btn">Toon mijn verhaal</button>
            
            <div id="personal-story-content">
                </div>

            <div class="footer-links">
                <a href="index.html" class="back-link" data-i18n="back-link">← Terug naar de start</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
